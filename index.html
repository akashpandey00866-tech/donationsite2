<title>जय मां काली समिति</title>
<style>
body{margin:0;background:linear-gradient(135deg,#5b0000,#861313);font-family:Arial;color:#fff}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#791212;border-radius:20px;padding:20px;margin:15px 0}
h1,h2,h3{text-align:center}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.box{background:#952121;padding:15px;border-radius:15px;text-align:center}
input,button{padding:12px;border:none;border-radius:10px}
input{width:100%;margin:6px 0}
.btn{background:gold;font-weight:bold;width:100%;cursor:pointer}
.green{background:#12953c;color:#fff;width:100%;cursor:pointer}
.red{background:#d40000;color:#fff;cursor:pointer}
table{width:100%;background:#fff;color:#000;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:gold}
#adminPanel{display:none}
.qr{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);justify-content:center;align-items:center}
.qrbox{background:#fff;color:#000;padding:20px;border-radius:20px;max-width:350px;width:90%;text-align:center}
.qrbox img{max-width:100%;border-radius:12px}
</style>

const app = initializeApp({

});

const db = getFirestore(app);
let donations=[], expenses=[], admin=false;

const seedData = [
{name:"श्री संदीप पाण्डेय",amount:null,special:"टेंट लाइट साउंड की व्यवस्था"},

];

window.showQR=()=>qr.style.display='flex';
window.hideQR=()=>qr.style.display='none';

window.searchDonation=()=>{
const v=search.value.toLowerCase();
document.querySelectorAll('#table tr').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(v)?'':'none');
};

function render(){
table.innerHTML='';
expenseTable.innerHTML='';
let total=0, spent=0;

donations.forEach(d=>{
const amt = Number(d.amount)||0;
if(amt>0) total += amt;

table.innerHTML += `
<tr>
<td>${d.name}</td>
<td>${amt>0 ? '₹'+amt : (d.special || '-')}</td>
<td>${d.special || '-'}</td>
<td>${admin ? `<button class="red" onclick="removeDonation('${d.id}')">Delete</button>` : '🔒 Admin Only'}</td>
</tr>`;
});

expenses.forEach(e=>{
const c=Number(e.cost)||0;
spent+=c;
expenseTable.innerHTML += `
<tr>
<td>${e.item}</td>
<td>₹${c}</td>
<td>
${admin ? `
<button onclick="editExpense('${e.id}','${e.item}',${c})">Edit</button>
<button class="red" onclick="deleteExpense('${e.id}')">Delete</button>
` : '🔒'}
</td>
</tr>`;
});

count.innerText=donations.length;
document.getElementById('total').innerText='₹'+total.toLocaleString('en-IN');
document.getElementById('spent').innerText='₹'+spent.toLocaleString('en-IN');
document.getElementById('remain').innerText='₹'+(total-spent).toLocaleString('en-IN');
}

if(password.value==='ashok#'){
admin=true;
adminPanel.style.display='block';
render();
alert('✅ Login Successful');
}else{

}
}

window.addDonation=async()=>{
await addDoc(collection(db,'donations'),{
name:name.value,
amount:amount.value?Number(amount.value):null,
special:special.value||''
});
name.value=''; amount.value=''; special.value='';
}

window.addExpense=async()=>{
await addDoc(collection(db,'expenses'),{
item:item.value,
cost:Number(cost.value)
});
item.value=''; cost.value='';
}

window.deleteExpense=async(id)=>{
await deleteDoc(doc(db,'expenses',id));
}

window.editExpense=async(id,oldItem,oldCost)=>{
const newItem = prompt('सामान नाम edit करें', oldItem);
const newCost = prompt('राशि edit करें', oldCost);
if(newItem!==null && newCost!==null){
await updateDoc(doc(db,'expenses',id),{
item:newItem,
cost:Number(newCost)
});
}
}

window.removeDonation=async(id)=>{
await deleteDoc(doc(db,'donations',id));
}

onSnapshot(collection(db,'donations'),s=>{
donations=[];
s.forEach(d=>donations.push({id:d.id,...d.data()}));
render();
});

onSnapshot(collection(db,'expenses'),s=>{
expenses=[];
s.forEach(d=>expenses.push({id:d.id,...d.data()}));
render();
});
